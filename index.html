<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator & Panduan Hidroponik</title>

    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- jsPDF for PDF export -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <!-- SheetJS (xlsx) for Excel export -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        /* Custom styles for the application */
        body {
            font-family: 'Inter', sans-serif;
        }

        /* Custom scrollbar for better aesthetics */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        ::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #555;
        }

        /* Style for active tab */
        .tab-active {
            border-bottom-color: #3b82f6;
            /* blue-500 */
            color: #3b82f6;
        }
    </style>
</head>

<body class="bg-slate-100">

    <div class="container mx-auto p-4 sm:p-6 lg:p-8">
        <div class="bg-white rounded-2xl shadow-xl p-6 sm:p-8">

            <!-- Header Section -->
            <div class="text-center mb-8">
                <h1 class="text-3xl sm:text-4xl font-bold text-slate-800">Kalkulator & Panduan Hidroponik</h1>
                <p class="text-slate-500 mt-2">Rencanakan sistem hidroponik Anda dari awal hingga panen dengan mudah.
                </p>
            </div>

            <!-- Input Form Section -->
            <div id="input-form" class="grid grid-cols-1 md:grid-cols-2 gap-8">

                <!-- Left Column: Plant and Space -->
                <div class="space-y-6">
                    <div>
                        <label for="plant-category" class="block text-sm font-medium text-slate-700 mb-2">1. Pilih
                            Kategori Tanaman</label>
                        <select id="plant-category"
                            class="w-full p-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition">
                            <option value="">-- Pilih Kategori --</option>
                            <option value="sayuran-daun">Sayuran Daun</option>
                            <option value="sayuran-buah">Sayuran Buah</option>
                            <option value="buah">Buah-buahan</option>
                            <option value="tanaman-hias">Tanaman Hias</option>
                        </select>
                    </div>
                    <div>
                        <label for="plant-specific" class="block text-sm font-medium text-slate-700 mb-2">2. Pilih
                            Tanaman Spesifik</label>
                        <select id="plant-specific"
                            class="w-full p-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition"
                            disabled>
                            <option>-- Pilih kategori dulu --</option>
                        </select>
                    </div>
                    <div>
                        <h3 class="block text-sm font-medium text-slate-700 mb-2">3. Ukuran Ruang (meter)</h3>
                        <div class="flex space-x-4">
                            <input type="number" id="space-length" placeholder="Panjang"
                                class="w-full p-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition">
                            <input type="number" id="space-width" placeholder="Lebar"
                                class="w-full p-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition">
                        </div>
                    </div>
                </div>

                <!-- Right Column: Materials -->
                <div class="space-y-6">
                    <div>
                        <label for="material-pipe" class="block text-sm font-medium text-slate-700 mb-2">4. Pilihan
                            Material Rangka/Pipa</label>
                        <select id="material-pipe"
                            class="w-full p-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition">
                            <option value="pvc">Pipa PVC (Ekonomis)</option>
                            <option value="baja">Baja Ringan (Kokoh)</option>
                        </select>
                    </div>
                    <div>
                        <label for="material-pump" class="block text-sm font-medium text-slate-700 mb-2">5. Pilihan
                            Kualitas Pompa Air</label>
                        <select id="material-pump"
                            class="w-full p-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition">
                            <option value="ekonomi">Kelas Ekonomi</option>
                            <option value="menengah">Kelas Menengah</option>
                            <option value="premium">Kelas Premium</option>
                        </select>
                    </div>
                    <div>
                        <label for="material-tank" class="block text-sm font-medium text-slate-700 mb-2">6. Pilihan
                            Wadah Nutrisi (Tandon)</label>
                        <select id="material-tank"
                            class="w-full p-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition">
                            <option value="ember">Ember/DIY (Paling Murah)</option>
                            <option value="styrofoam">Boks Styrofoam</option>
                            <option value="khusus">Bak Plastik Khusus</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- Action Button -->
            <div class="mt-8 text-center">
                <button id="analyze-button"
                    class="bg-blue-600 text-white font-bold py-3 px-8 rounded-lg hover:bg-blue-700 transition-transform transform hover:scale-105 shadow-lg">
                    <i class="fas fa-cogs mr-2"></i> Buat Analisa
                </button>
            </div>
        </div>

        <!-- Results Section (Initially Hidden) -->
        <div id="results-section" class="bg-white rounded-2xl shadow-xl p-6 sm:p-8 mt-8 hidden">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl sm:text-3xl font-bold text-slate-800">Hasil Analisa & Panduan Anda</h2>
                <div class="flex space-x-2">
                    <button id="export-pdf"
                        class="bg-red-500 text-white px-4 py-2 rounded-lg hover:bg-red-600 transition text-sm">
                        <i class="fas fa-file-pdf mr-1"></i> PDF
                    </button>
                    <button id="export-excel"
                        class="bg-green-600 text-white px-4 py-2 rounded-lg hover:bg-green-700 transition text-sm">
                        <i class="fas fa-file-excel mr-1"></i> Excel
                    </button>
                </div>
            </div>

            <!-- Tab Navigation -->
            <div class="border-b border-slate-200 mb-6">
                <nav class="flex space-x-4 sm:space-x-8 -mb-px" aria-label="Tabs">
                    <button class="tab-btn tab-active whitespace-nowrap py-4 px-1 border-b-2 font-medium text-sm"
                        data-tab="summary">Ringkasan</button>
                    <button
                        class="tab-btn whitespace-nowrap py-4 px-1 border-b-2 border-transparent text-slate-500 hover:text-slate-700 hover:border-slate-300 font-medium text-sm"
                        data-tab="simulation">Simulasi Instalasi</button>
                    <button
                        class="tab-btn whitespace-nowrap py-4 px-1 border-b-2 border-transparent text-slate-500 hover:text-slate-700 hover:border-slate-300 font-medium text-sm"
                        data-tab="guide">Panduan Lengkap</button>
                    <button
                        class="tab-btn whitespace-nowrap py-4 px-1 border-b-2 border-transparent text-slate-500 hover:text-slate-700 hover:border-slate-300 font-medium text-sm"
                        data-tab="shopping">Daftar Belanja</button>
                </nav>
            </div>

            <!-- Tab Content -->
            <div id="tab-content">
                <!-- Summary Content -->
                <div id="summary-content" class="tab-pane"></div>
                <!-- Simulation Content -->
                <div id="simulation-content" class="tab-pane hidden"></div>
                <!-- Guide Content -->
                <div id="guide-content" class="tab-pane hidden"></div>
                <!-- Shopping List Content -->
                <div id="shopping-content" class="tab-pane hidden"></div>
            </div>
        </div>
    </div>

    <script>
        // --- DATABASE ---
        // This object holds all the information about plants and materials.
        const appData = {
            plants: {
                'sayuran-daun': {
                    'selada': { name: 'Selada', ph: '5.5 - 6.5', ppm: '560 - 840', difficulty: 'Pemula', time: '30-45 Hari', system: 'DFT' },
                    'pakcoy': { name: 'Pakcoy', ph: '6.0 - 7.0', ppm: '1050 - 1400', difficulty: 'Pemula', time: '25-40 Hari', system: 'DFT' },
                    'kangkung': { name: 'Kangkung', ph: '5.5 - 6.5', ppm: '560 - 1400', difficulty: 'Pemula', time: '20-30 Hari', system: 'DFT' },
                    'bayam': { name: 'Bayam', ph: '6.0 - 7.0', ppm: '1260 - 1610', difficulty: 'Pemula', time: '30-40 Hari', system: 'DFT' },
                    'sawi': { name: 'Sawi Hijau', ph: '6.0 - 7.0', ppm: '1050 - 1400', difficulty: 'Pemula', time: '25-40 Hari', system: 'DFT' },
                    'kale': { name: 'Kale', ph: '5.5 - 6.5', ppm: '840 - 1200', difficulty: 'Pemula', time: '55-65 Hari', system: 'DFT' },
                    'seledri': { name: 'Seledri', ph: '6.0 - 6.5', ppm: '1260 - 1680', difficulty: 'Menengah', time: '80-90 Hari', system: 'DFT' },
                    'daun-bawang': { name: 'Daun Bawang', ph: '6.0 - 7.0', ppm: '980 - 1260', difficulty: 'Pemula', time: '60-70 Hari', system: 'DFT' },
                    'mint': { name: 'Daun Mint', ph: '6.0 - 7.0', ppm: '1400 - 1680', difficulty: 'Pemula', time: '40-50 Hari', system: 'DFT' },
                    'kemangi': { name: 'Kemangi', ph: '5.5 - 6.5', ppm: '700 - 1120', difficulty: 'Pemula', time: '30-40 Hari', system: 'DFT' }
                },
                'sayuran-buah': {
                    'tomat': { name: 'Tomat', ph: '5.5 - 6.5', ppm: '1400 - 3500', difficulty: 'Menengah', time: '60-90 Hari', system: 'DFT' },
                    'cabai': { name: 'Cabai', ph: '5.5 - 6.0', ppm: '1260 - 1540', difficulty: 'Menengah', time: '70-100 Hari', system: 'DFT' },
                    'timun': { name: 'Timun', ph: '5.5 - 6.0', ppm: '1190 - 1750', difficulty: 'Menengah', time: '50-70 Hari', system: 'DFT' },
                    'terong': { name: 'Terong', ph: '5.5 - 6.5', ppm: '1750 - 2450', difficulty: 'Menengah', time: '90-110 Hari', system: 'DFT' },
                    'paprika': { name: 'Paprika', ph: '5.5 - 6.0', ppm: '1400 - 1750', difficulty: 'Menengah', time: '70-90 Hari', system: 'DFT' },
                    'zucchini': { name: 'Zucchini', ph: '6.0 - 6.5', ppm: '1260 - 1680', difficulty: 'Menengah', time: '50-60 Hari', system: 'DFT' },
                    'buncis': { name: 'Buncis', ph: '6.0 - 6.5', ppm: '1400 - 1680', difficulty: 'Menengah', time: '50-60 Hari', system: 'DFT' },
                    'kacang-panjang': { name: 'Kacang Panjang', ph: '6.0 - 6.5', ppm: '1050 - 1400', difficulty: 'Menengah', time: '50-60 Hari', system: 'DFT' },
                    'pare': { name: 'Pare', ph: '5.5 - 6.0', ppm: '1400 - 1750', difficulty: 'Menengah', time: '60-70 Hari', system: 'DFT' },
                    'okra': { name: 'Okra', ph: '6.0 - 6.5', ppm: '1400 - 1680', difficulty: 'Menengah', time: '50-60 Hari', system: 'DFT' }
                },
                'buah': {
                    'stroberi': { name: 'Stroberi', ph: '5.5 - 6.2', ppm: '1260 - 1540', difficulty: 'Mahir', time: '60-90 Hari', system: 'DFT' },
                    'melon': { name: 'Melon', ph: '5.5 - 6.0', ppm: '1400 - 1750', difficulty: 'Mahir', time: '75-95 Hari', system: 'DFT' },
                    'semangka': { name: 'Semangka', ph: '5.5 - 6.5', ppm: '1260 - 1680', difficulty: 'Mahir', time: '80-100 Hari', system: 'DFT' },
                    'blewah': { name: 'Blewah', ph: '5.5 - 6.5', ppm: '1400 - 1750', difficulty: 'Mahir', time: '70-90 Hari', system: 'DFT' },
                    'tomat-ceri': { name: 'Tomat Ceri', ph: '5.5 - 6.5', ppm: '1400 - 2800', difficulty: 'Menengah', time: '50-70 Hari', system: 'DFT' }
                },
                'tanaman-hias': {
                    'anggrek': { name: 'Anggrek', ph: '5.5 - 6.5', ppm: '400 - 800', difficulty: 'Mahir', time: 'Bervariasi', system: 'Wick' },
                    'sirih-gading': { name: 'Sirih Gading (Pothos)', ph: '5.5 - 6.5', ppm: '200 - 800', difficulty: 'Pemula', time: 'Bervariasi', system: 'Wick' },
                    'aglaonema': { name: 'Aglaonema', ph: '5.5 - 6.5', ppm: '200 - 600', difficulty: 'Pemula', time: 'Bervariasi', system: 'Wick' },
                    'philodendron': { name: 'Philodendron', ph: '5.5 - 6.5', ppm: '800 - 1200', difficulty: 'Pemula', time: 'Bervariasi', system: 'Wick' }
                }
            },
            materials: {
                pipe: { pvc: 60000, baja: 120000 },
                pump: { ekonomi: 75000, menengah: 150000, premium: 250000 },
                tank: { ember: 30000, styrofoam: 50000, khusus: 100000 }
            },
            otherCosts: {
                selang: 5000, // per meter
                netpot: 750, // per piece
                flanel: 12000, // per meter
                benih: 15000,
                rockwool: 25000,
                abmix: 35000,
                alatUkur: 120000,
            }
        };

        // --- DOM ELEMENTS ---
        const categorySelect = document.getElementById('plant-category');
        const specificSelect = document.getElementById('plant-specific');
        const analyzeButton = document.getElementById('analyze-button');
        const resultsSection = document.getElementById('results-section');
        const tabButtons = document.querySelectorAll('.tab-btn');
        const tabPanes = document.querySelectorAll('.tab-pane');

        // --- EVENT LISTENERS ---

        // Populate specific plant dropdown when a category is chosen
        categorySelect.addEventListener('change', () => {
            const category = categorySelect.value;
            specificSelect.innerHTML = '<option value="">-- Pilih Tanaman --</option>';
            if (category && appData.plants[category]) {
                specificSelect.disabled = false;
                for (const key in appData.plants[category]) {
                    const option = document.createElement('option');
                    option.value = key;
                    option.textContent = appData.plants[category][key].name;
                    specificSelect.appendChild(option);
                }
            } else {
                specificSelect.disabled = true;
                specificSelect.innerHTML = '<option>-- Pilih kategori dulu --</option>';
            }
        });

        // Generate analysis when the button is clicked
        analyzeButton.addEventListener('click', generateAnalysis);

        // Handle tab switching
        tabButtons.forEach(button => {
            button.addEventListener('click', () => {
                tabButtons.forEach(btn => {
                    btn.classList.remove('tab-active');
                    btn.classList.add('border-transparent', 'text-slate-500', 'hover:text-slate-700', 'hover:border-slate-300');
                });
                button.classList.add('tab-active');
                button.classList.remove('border-transparent', 'text-slate-500', 'hover:text-slate-700', 'hover:border-slate-300');

                const tab = button.dataset.tab;
                tabPanes.forEach(pane => {
                    if (pane.id === `${tab}-content`) {
                        pane.classList.remove('hidden');
                    } else {
                        pane.classList.add('hidden');
                    }
                });
            });
        });

        // Export functionality
        document.getElementById('export-pdf').addEventListener('click', exportToPDF);
        document.getElementById('export-excel').addEventListener('click', exportToExcel);


        // --- CORE FUNCTIONS ---

        /**
         * Main function to generate the analysis based on user inputs.
         */
        function generateAnalysis() {
            // 1. Get all user inputs
            const inputs = getUserInputs();
            if (!inputs) {
                alert('Harap lengkapi semua isian terlebih dahulu.');
                return;
            }

            // 2. Perform calculations
            const calculations = performCalculations(inputs);

            // 3. Generate HTML content for each tab
            document.getElementById('summary-content').innerHTML = generateSummaryHTML(inputs.plantInfo);
            document.getElementById('simulation-content').innerHTML = generateSimulationHTML(calculations, inputs.plantInfo);
            document.getElementById('guide-content').innerHTML = generateGuideHTML(inputs.plantInfo);
            document.getElementById('shopping-content').innerHTML = generateShoppingHTML(calculations);

            // 4. Show the results section and scroll to it
            resultsSection.classList.remove('hidden');
            resultsSection.scrollIntoView({ behavior: 'smooth' });
        }

        /**
         * Gathers and validates all inputs from the form.
         * @returns {object|null} An object with user inputs or null if validation fails.
         */
        function getUserInputs() {
            const category = categorySelect.value;
            const specific = specificSelect.value;
            const length = parseFloat(document.getElementById('space-length').value);
            const width = parseFloat(document.getElementById('space-width').value);
            const pipe = document.getElementById('material-pipe').value;
            const pump = document.getElementById('material-pump').value;
            const tank = document.getElementById('material-tank').value;

            if (!category || !specific || !length || !width) {
                return null;
            }

            return {
                plantInfo: appData.plants[category][specific],
                length,
                width,
                materials: { pipe, pump, tank }
            };
        }

        /**
         * Performs all necessary calculations for the hydroponic system.
         * @param {object} inputs - The user inputs object.
         * @returns {object} An object with all calculated values.
         */
        function performCalculations(inputs) {
            const { length, width, materials, plantInfo } = inputs;
            const area = length * width;

            // Logic adjusted for different systems
            let numPipes = 0, pipeLength = 0, holesPerPipe = 0, totalHoles = 0;
            if (plantInfo.system !== 'Wick') {
                numPipes = Math.max(1, Math.floor(width / 0.5));
                pipeLength = Math.max(1, length - 0.2); // leave some space
                holesPerPipe = Math.max(4, Math.floor(pipeLength * 6));
                totalHoles = numPipes * holesPerPipe;
            } else {
                // For wick system, calculate based on pots
                totalHoles = Math.max(1, Math.floor(area / 0.1)); // approx 1 pot per 0.1 sqm
            }

            // Cost calculation
            const pipeCost = numPipes * appData.materials.pipe[materials.pipe];
            const pumpCost = plantInfo.system !== 'Wick' ? appData.materials.pump[materials.pump] : 0;
            const tankCost = appData.materials.tank[materials.tank];
            const hoseLength = plantInfo.system !== 'Wick' ? Math.ceil(length + 2) : 0;
            const hoseCost = hoseLength * appData.otherCosts.selang;
            const netpotCost = totalHoles * appData.otherCosts.netpot;
            const flanelCost = appData.otherCosts.flanel;

            const installTotal = pipeCost + pumpCost + tankCost + hoseCost + netpotCost + flanelCost;
            const starterTotal = appData.otherCosts.benih + appData.otherCosts.rockwool + appData.otherCosts.abmix + appData.otherCosts.alatUkur;
            const grandTotal = installTotal + starterTotal;

            return {
                numPipes,
                pipeLength,
                totalHoles,
                hoseLength,
                costs: {
                    pipe: { name: document.querySelector(`#material-pipe option[value=${materials.pipe}]`).textContent, qty: numPipes, price: pipeCost },
                    pump: { name: document.querySelector(`#material-pump option[value=${materials.pump}]`).textContent, qty: plantInfo.system !== 'Wick' ? 1 : 0, price: pumpCost },
                    tank: { name: document.querySelector(`#material-tank option[value=${materials.tank}]`).textContent, qty: 1, price: tankCost },
                    hose: { name: 'Selang', qty: hoseLength, price: hoseCost },
                    netpot: { name: 'Netpot', qty: totalHoles, price: netpotCost },
                    flanel: { name: 'Kain Flanel', qty: 1, price: flanelCost },
                    benih: { name: `Benih ${inputs.plantInfo.name}`, qty: 1, price: appData.otherCosts.benih },
                    rockwool: { name: 'Rockwool', qty: 1, price: appData.otherCosts.rockwool },
                    abmix: { name: 'Nutrisi AB Mix', qty: 1, price: appData.otherCosts.abmix },
                    alatUkur: { name: 'Alat Ukur pH & TDS', qty: 1, price: appData.otherCosts.alatUkur },
                },
                totals: {
                    install: installTotal,
                    starter: starterTotal,
                    grand: grandTotal
                }
            };
        }

        // --- HTML GENERATION FUNCTIONS ---

        function generateSummaryHTML(plantInfo) {
            return `
            <h3 class="text-xl font-bold text-slate-700 mb-4">Analisa Tanaman: ${plantInfo.name}</h3>
            <div class="grid grid-cols-2 sm:grid-cols-4 gap-4 text-center">
                <div class="bg-blue-50 p-4 rounded-lg">
                    <p class="text-sm text-blue-500 font-semibold">Tingkat Kesulitan</p>
                    <p class="text-lg font-bold text-blue-800">${plantInfo.difficulty}</p>
                </div>
                <div class="bg-green-50 p-4 rounded-lg">
                    <p class="text-sm text-green-500 font-semibold">Rentang pH Ideal</p>
                    <p class="text-lg font-bold text-green-800">${plantInfo.ph}</p>
                </div>
                <div class="bg-yellow-50 p-4 rounded-lg">
                    <p class="text-sm text-yellow-500 font-semibold">Kebutuhan Nutrisi (PPM)</p>
                    <p class="text-lg font-bold text-yellow-800">${plantInfo.ppm}</p>
                </div>
                <div class="bg-purple-50 p-4 rounded-lg">
                    <p class="text-sm text-purple-500 font-semibold">Estimasi Panen/Berbunga</p>
                    <p class="text-lg font-bold text-purple-800">${plantInfo.time}</p>
                </div>
            </div>
        `;
        }

        function generateSimulationHTML(calcs, plantInfo) {
            const systemType = plantInfo.system;
            let description = '';
            let keterangan = '';

            if (systemType === 'DFT') {
                description = `Dengan ruang yang Anda miliki, sistem yang paling direkomendasikan adalah <strong>Deep Flow Technique (DFT)</strong>. Sistem ini serbaguna, mudah dirawat, dan cocok untuk pemula. Anda dapat membangun instalasi dengan <strong>${calcs.numPipes} pipa</strong>, masing-masing sepanjang <strong>${calcs.pipeLength.toFixed(1)} meter</strong>, dengan total <strong>${calcs.totalHoles} lubang tanam</strong>.`;
                keterangan = `
                <p><strong>Komponen Utama Sistem DFT:</strong></p>
                <ul class="list-disc list-inside ml-4">
                    <li><strong>Tandon Nutrisi:</strong> Wadah untuk menampung air dan nutrisi AB Mix.</li>
                    <li><strong>Pompa Air:</strong> Diletakkan di dalam tandon untuk memompa air ke pipa tertinggi.</li>
                    <li><strong>Pipa Inlet:</strong> Selang yang mengalirkan air dari pompa ke instalasi.</li>
                    <li><strong>Rangka Pipa DFT:</strong> Tempat menanam tanaman. Air menggenang setinggi 2-3 cm.</li>
                    <li><strong>Pipa Outlet:</strong> Mengembalikan air dari pipa terendah kembali ke tandon.</li>
                </ul>`;
            } else if (systemType === 'Wick') {
                description = `Untuk <strong>${plantInfo.name}</strong>, sistem yang paling sederhana dan aman adalah <strong>Sistem Sumbu (Wick System)</strong>. Sistem ini tidak memerlukan listrik dan cocok untuk tanaman hias. Anda bisa menyiapkan sekitar <strong>${calcs.totalHoles} pot</strong> di area Anda.`;
                keterangan = `
                <p><strong>Komponen Utama Sistem Sumbu (Wick):</strong></p>
                <ul class="list-disc list-inside ml-4">
                    <li><strong>Wadah Tanam (Netpot):</strong> Berisi media tanam (arang, hidroton) dan tanaman.</li>
                    <li><strong>Sumbu Kain Flanel:</strong> Menghubungkan media tanam dengan larutan nutrisi di bawahnya.</li>
                    <li><strong>Tandon Nutrisi:</strong> Wadah berisi larutan nutrisi di bawah pot.</li>
                </ul>`;
            }

            return `
            <h3 class="text-xl font-bold text-slate-700 mb-4">Simulasi Instalasi & Sistem</h3>
            <div class="bg-slate-50 p-4 rounded-lg border border-slate-200">
                <p class="mb-4 text-slate-600">${description}</p>
                <div class="mt-4 text-sm text-slate-500">${keterangan}</div>
            </div>
        `;
        }

        function generateGuideHTML(plantInfo) {
            return `
            <h3 class="text-xl font-bold text-slate-700 mb-4">Panduan Lengkap dari Semai hingga Panen</h3>
            <div class="space-y-4">
                <details class="bg-slate-50 p-4 rounded-lg border border-slate-200 group" open>
                    <summary class="font-semibold text-slate-800 cursor-pointer list-none flex justify-between items-center">
                        Tahap 1: Penyemaian (3-10 Hari)
                        <i class="fas fa-chevron-down transition-transform duration-300 group-open:rotate-180"></i>
                    </summary>
                    <div class="mt-3 text-slate-600">
                        <ol class="list-decimal list-inside space-y-2">
                            <li>Potong rockwool menjadi dadu 2.5x2.5 cm, lalu basahi hingga lembab.</li>
                            <li>Lubangi rockwool dan masukkan 1-2 benih ${plantInfo.name}.</li>
                            <li>Simpan di tempat gelap sampai benih pecah (sprout). Setelah itu, kenalkan pada cahaya matahari pagi.</li>
                            <li>Jaga kelembaban rockwool hingga muncul 4 daun sejati.</li>
                        </ol>
                    </div>
                </details>
                <details class="bg-slate-50 p-4 rounded-lg border border-slate-200 group">
                    <summary class="font-semibold text-slate-800 cursor-pointer list-none flex justify-between items-center">
                        Tahap 2: Perawatan Rutin
                        <i class="fas fa-chevron-down transition-transform duration-300 group-open:rotate-180"></i>
                    </summary>
                    <div class="mt-3 text-slate-600">
                        <ul class="list-disc list-inside space-y-2">
                            <li><strong>Setiap Hari:</strong> Cek kondisi tanaman dan pastikan air/nutrisi tersedia.</li>
                            <li><strong>Setiap 3 Hari:</strong> Ukur pH (target ${plantInfo.ph}) dan PPM (target ${plantInfo.ppm}). Tambahkan nutrisi atau air baku jika perlu.</li>
                            <li><strong>Setiap Minggu:</strong> Cek tandon, tambahkan air baku jika berkurang banyak.</li>
                            <li><strong>Setelah Panen:</strong> Kuras total tandon dan bersihkan instalasi untuk memulai siklus baru.</li>
                        </ul>
                    </div>
                </details>
                <details class="bg-slate-50 p-4 rounded-lg border border-slate-200 group">
                    <summary class="font-semibold text-slate-800 cursor-pointer list-none flex justify-between items-center">
                        Tahap 3: Hama & Panen
                        <i class="fas fa-chevron-down transition-transform duration-300 group-open:rotate-180"></i>
                    </summary>
                    <div class="mt-3 text-slate-600 space-y-2">
                        <p><strong>Hama Umum:</strong> Kutu daun (aphids) adalah yang paling sering muncul. Atasi dengan semprotan air sabun atau pestisida nabati.</p>
                        <p><strong>Waktu Panen:</strong> Tanaman ${plantInfo.name} siap dipanen/berbunga dalam waktu sekitar <strong>${plantInfo.time}</strong>. Panen sayuran saat pagi hari untuk kesegaran maksimal.</p>
                    </div>
                </details>
            </div>
        `;
        }

        function generateShoppingHTML(calcs) {
            const { costs, totals } = calcs;
            const installItems = Object.values(costs).slice(0, 6).filter(item => item.qty > 0);
            const starterItems = Object.values(costs).slice(6);

            return `
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                <div>
                    <h3 class="text-xl font-bold text-slate-700 mb-4">Kebutuhan Instalasi</h3>
                    <div class="overflow-x-auto">
                        <table class="w-full text-sm text-left text-slate-500">
                            <thead class="text-xs text-slate-700 uppercase bg-slate-100">
                                <tr>
                                    <th scope="col" class="px-6 py-3">Komponen</th>
                                    <th scope="col" class="px-6 py-3 text-center">Jumlah</th>
                                    <th scope="col" class="px-6 py-3 text-right">Estimasi Biaya</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${installItems.map(item => `
                                <tr class="bg-white border-b">
                                    <td class="px-6 py-4 font-medium text-slate-900 whitespace-nowrap">${item.name}</td>
                                    <td class="px-6 py-4 text-center">${item.qty}</td>
                                    <td class="px-6 py-4 text-right">${formatRupiah(item.price)}</td>
                                </tr>`).join('')}
                                <tr class="bg-slate-50 font-semibold">
                                    <td colspan="2" class="px-6 py-4 text-slate-800">Subtotal Instalasi</td>
                                    <td class="px-6 py-4 text-right text-slate-800">${formatRupiah(totals.install)}</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
                <div>
                    <h3 class="text-xl font-bold text-slate-700 mb-4">Perlengkapan Awal (Starter Kit)</h3>
                     <div class="overflow-x-auto">
                        <table class="w-full text-sm text-left text-slate-500">
                            <thead class="text-xs text-slate-700 uppercase bg-slate-100">
                                <tr>
                                    <th scope="col" class="px-6 py-3">Komponen</th>
                                    <th scope="col" class="px-6 py-3 text-right">Estimasi Biaya</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${starterItems.map(item => `
                                <tr class="bg-white border-b">
                                    <td class="px-6 py-4 font-medium text-slate-900 whitespace-nowrap">${item.name}</td>
                                    <td class="px-6 py-4 text-right">${formatRupiah(item.price)}</td>
                                </tr>`).join('')}
                                <tr class="bg-slate-50 font-semibold">
                                    <td class="px-6 py-4 text-slate-800">Subtotal Starter Kit</td>
                                    <td class="px-6 py-4 text-right text-slate-800">${formatRupiah(totals.starter)}</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
            <div class="mt-8 bg-blue-100 border-l-4 border-blue-500 text-blue-800 p-4 rounded-r-lg text-center">
                <p class="text-lg">Total Estimasi Biaya Keseluruhan:</p>
                <p class="text-3xl font-bold">${formatRupiah(totals.grand)}</p>
            </div>
        `;
        }


        // --- UTILITY FUNCTIONS ---

        /**
         * Formats a number into Indonesian Rupiah currency format.
         * @param {number} number - The number to format.
         * @returns {string} The formatted currency string.
         */
        function formatRupiah(number) {
            return new Intl.NumberFormat('id-ID', {
                style: 'currency',
                currency: 'IDR',
                minimumFractionDigits: 0
            }).format(number);
        }

        /**
         * Exports the results section content to a PDF file.
         */
        function exportToPDF() {
            const { jsPDF } = window.jspdf;
            const content = document.getElementById('results-section');

            // Show all tabs for capturing
            const hiddenPanes = [];
            tabPanes.forEach(pane => {
                if (pane.classList.contains('hidden')) {
                    hiddenPanes.push(pane);
                    pane.classList.remove('hidden');
                }
            });

            html2canvas(content, { scale: 2, useCORS: true }).then(canvas => {
                const imgData = canvas.toDataURL('image/png');
                const pdf = new jsPDF('p', 'mm', 'a4');
                const pdfWidth = pdf.internal.pageSize.getWidth();
                const pdfHeight = (canvas.height * pdfWidth) / canvas.width;
                pdf.addImage(imgData, 'PNG', 0, 0, pdfWidth, pdfHeight);
                pdf.save("Panduan-Hidroponik.pdf");

                // Hide the tabs again
                hiddenPanes.forEach(pane => pane.classList.add('hidden'));
            });
        }

        /**
         * Exports the shopping list to an Excel file.
         */
        function exportToExcel() {
            const inputs = getUserInputs();
            if (!inputs) return;
            const calcs = performCalculations(inputs);
            const { costs, totals } = calcs;

            // Prepare data for Excel sheets
            const installData = [
                ["Kebutuhan Instalasi", "Jumlah", "Estimasi Biaya"],
                ...Object.values(costs).slice(0, 6).filter(i => i.qty > 0).map(item => [item.name, item.qty, item.price]),
                ["Subtotal", "", totals.install]
            ];

            const starterData = [
                ["Perlengkapan Awal", "Estimasi Biaya"],
                ...Object.values(costs).slice(6).map(item => [item.name, item.price]),
                ["Subtotal", totals.starter]
            ];

            const summaryData = [
                ["Total Estimasi Biaya", totals.grand]
            ];

            // Create worksheets
            const wsInstall = XLSX.utils.aoa_to_sheet(installData);
            const wsStarter = XLSX.utils.aoa_to_sheet(starterData);
            const wsSummary = XLSX.utils.aoa_to_sheet(summaryData);

            // Create a workbook
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, wsInstall, "Instalasi");
            XLSX.utils.book_append_sheet(wb, wsStarter, "Starter Kit");
            XLSX.utils.book_append_sheet(wb, wsSummary, "Total Biaya");

            // Trigger download
            XLSX.writeFile(wb, "Daftar-Belanja-Hidroponik.xlsx");
        }

    </script>
</body>
